services:
  nats:
    image: nats:2.12.6-alpine
    container_name: bench-nats
    deploy:
      resources:
        limits:
          cpus: "${BENCH_CPUS:-2.0}"
          memory: "${BENCH_MEMORY:-4g}"
    entrypoint: ["/bin/sh", "/etc/nats/nats-entrypoint.sh"]
    environment:
      NATS_MAX_MEM: "${NATS_MAX_MEM:-256MB}"
      NATS_MAX_FILE: "${NATS_MAX_FILE:-10GB}"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
      - ./nats-entrypoint.sh:/etc/nats/nats-entrypoint.sh:ro
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz" ]
      interval: 5s
      timeout: 5s
      retries: 30

  nats-box:
    image: natsio/nats-box:latest
    container_name: bench-nats-box
    entrypoint: /bin/sh
    command: -c "sleep infinity"
    profiles:
      - tools
    depends_on:
      - nats

  nats-nui:
    image: ghcr.io/nats-nui/nui:latest
    container_name: bench-nats-nui
    environment:
      NATS_URL: nats://nats:4222
    ports:
      - "31311:31311"
    profiles:
      - tools
    depends_on:
      - nats

volumes:
  nats_data:
